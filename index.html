<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>フリマウォッチ 通知操作</title>
</head>
<body style="font-family:sans-serif;padding:28px;line-height:1.7;max-width:680px;">
<h2 id="msg">処理中…</h2>
<p id="detail" style="color:#666;font-size:13px;word-break:break-all;"></p>
<p style="color:#888;font-size:11px;margin-top:24px;">このタブは閉じてOKです（数秒でシートに反映されます）</p>
<script>
/*
 2026-06-18 (Harada「シークレット無しでボタンを直せ」): Apps Script の /exec を直接クリックすると
 原田の多アカウント Chrome で Google が account router(accounts?authuser) を挟み doGet 到達前に失敗する。
 本ページ(github.io = 非 Google ドメイン)は account router を発生させず、 ここから
 fetch(..., {credentials:'omit'}) = Cookie を送らない匿名リクエストで Apps Script を叩くため、
 ブラウザのログイン状態に一切依存せず確実に実行される(匿名アクセスは検証済で正常動作)。
*/
/*
 2026-07-22 マルチ group ルータ化: S/D の旧 GAS は再現実験 (到達保証の直接発火×3タイトル型) で
 全パターン「You do not have permission to access the requested document」= 実行オーナーがシートを
 開けず **一次削除が恒久的に全滅** と確定 (タイトル型/エンコードは無関係)。 そのため全 group の
 一次処理を H の Web アプリ (clasp 管理・3シート access 実証済み) に &grp=h/s/d 付きで一本化する。
 旧 S/D URL は記録用に残すが使用しない (permission-dead)。
*/
var APP = {
  h: "https://script.google.com/macros/s/AKfycbwUkXDP-viXKHzAX1Qwxa7nSFJgxckVJWjUjlye8MUHDAdAU1qjylWpFF1C9cNFNsglnQ/exec",
  s: "https://script.google.com/macros/s/AKfycbwUkXDP-viXKHzAX1Qwxa7nSFJgxckVJWjUjlye8MUHDAdAU1qjylWpFF1C9cNFNsglnQ/exec",
  d: "https://script.google.com/macros/s/AKfycbwUkXDP-viXKHzAX1Qwxa7nSFJgxckVJWjUjlye8MUHDAdAU1qjylWpFF1C9cNFNsglnQ/exec"
};
// 旧 S/D 直行 URL (permission-dead 2026-07-22 確定、 復旧しても使わないこと):
//   s: AKfycbysUh7xw5399VYOycK8hGfcMB7yCZ10YL0gctIUycYx89rN5MUNfyMZxMzdNdskUTG4dQ
//   d: AKfycbzonJPoOEHC6T1m8mL5_a_6BrNP6ssIJOvnLwJLjeVodRIH2HZ3APs4rqxfzrJFZ6JzSA
var p = new URLSearchParams(location.search);
var g = (p.get("g") || "").toLowerCase();
var q = p.get("q") || "";        // 行削除 / 画像検索切替 / 除外
var t = p.get("t") || "";        // title
var ts = p.get("ts") || "一覧";   // sheet 名
var u = p.get("u") || "";        // 除外用 item URL
var base = APP[g];
function show(m, d) {
  document.getElementById("msg").textContent = m;
  document.getElementById("detail").textContent = d || "";
}
if (!base || !q) {
  show("⚠️ リンクのパラメータが不正です", "g=" + g + " q=" + q);
} else {
  // grp= で H ルータに処理対象 group を伝える (2026-07-22。 grp 無しは H 扱い = 後方互換)。
  var url = base + "?query=" + encodeURIComponent(q)
          + "&title=" + encodeURIComponent(t)
          + "&ts=" + encodeURIComponent(ts)
          + "&grp=" + encodeURIComponent(g);
  if (q === "除外") url += "&url=" + encodeURIComponent(u);

  /*
   2026-07-22 削除リクエスト監査 + HDC 自動修復の起点 (Harada「ログに残す/消えてなければHDC削除/エラー検知」):
   no-cors では応答を読めない = このページはクリックが GAS に届いたか確認できない。 そこで primary 処理とは別に、
   HDC が clasp/SA で唯一握れる H スプシへ「削除を要求した事実」を監査ビーコンとして必ず 1 発残す。
   S/D の GAS には操作ログが無く監視不能なので、 全 group を H スプシ「削除リクエスト監査」tab に集約する。
   → HDC 日次 reconcile が sa_{group} で実シートを突合し、 未削除なら自動削除 + Chatwork 通知する安全網。
   reqid は問い合わせ突合用に画面表示する。
  */
  function genReqId() {
    var rnd = Math.random().toString(36).slice(2, 8);
    return "R" + Date.now().toString(36) + rnd;
  }
  var reqid = genReqId();
  // 監査ビーコンは常に H の Web アプリ (APP.h) へ。 group=g で どの group の削除要求かを記録。
  var auditUrl = APP.h + "?query=reqlog"
               + "&reqid=" + encodeURIComponent(reqid)
               + "&group=" + encodeURIComponent(g)
               + "&op=" + encodeURIComponent(q)
               + "&title=" + encodeURIComponent(t)
               + "&ts=" + encodeURIComponent(ts);
  function fireAudit() {
    try {
      fetch(auditUrl, { method: "GET", mode: "no-cors", credentials: "omit",
                        cache: "no-store", keepalive: true }).catch(function () {});
    } catch (e) {}
  }

  /*
   2026-07-19 hardening (「押したのに消えない」= click が GAS に届かず無反応の incident 根治):
   ① keepalive:true = タブを閉じて/遷移してもリクエストを中断させない (fetch が破棄されると
      GAS に届かず無反応になる。 no-cors GET でも keepalive でページ unload をまたいで送信完了する)。
   ② 失敗時 1 回だけ自動リトライ (瞬断/一時ブロック対策)。
   ③ 文言を「削除しました」→「削除リクエストを送信しました（数秒後に反映）」に是正。
      no-cors では GAS の応答内容を JS から読めない = 実際に処理されたか確認できないため、
      「削除完了」と断言するのは誤り。 完了を断言すると「成功表示なのに消えない」混乱の元 (本 incident)。
  */
  function done() {
    var label = q === "行削除" ? "✅ 削除リクエストを送信しました（数秒後にシートへ反映されます）"
              : q === "画像検索切替" ? "✅ 画像検索の切り替えを送信しました（数秒後に反映されます）"
              : "✅ 除外を送信しました（今後この商品は通知に出ません）";
    show(label, t + "  ／ 受付ID: " + reqid);
  }
  function fire() {
    return fetch(url, { method: "GET", mode: "no-cors", credentials: "omit",
                        cache: "no-store", keepalive: true });
  }
  // 監査ビーコンを先に撃つ (primary が click 消失しても監査は残り HDC が自動修復できる)。
  fireAudit();
  fire()
    .then(done)
    .catch(function () {
      setTimeout(function () {
        fire().then(done).catch(function (e) {
          show("🔴 通信エラー（時間をおいて再度クリックしてください）", String(e) + " ／ 受付ID: " + reqid);
        });
      }, 1500);
    });
}
</script>
</body>
</html>
